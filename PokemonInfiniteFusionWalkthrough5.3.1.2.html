<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Infinite Fusion Guide JP</title>
  <script src="guide-data.js"></script>
  <script src="guide-data-ja.js"></script>
  <style>
    :root {
      --bg: #f5efe4;
      --bg-strong: #e9dfcf;
      --surface: rgba(255, 251, 245, 0.9);
      --surface-strong: #fffaf2;
      --ink: #261b17;
      --muted: #69584d;
      --line: rgba(38, 27, 23, 0.12);
      --accent: #b5442b;
      --accent-soft: rgba(181, 68, 43, 0.12);
      --forest: #35574a;
      --shadow: 0 24px 70px rgba(58, 32, 18, 0.12);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      font-family: "Yu Gothic UI", "Hiragino Sans", "Meiryo", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(181, 68, 43, 0.14), transparent 24rem),
        radial-gradient(circle at top right, rgba(53, 87, 74, 0.12), transparent 26rem),
        linear-gradient(180deg, #f7f2e8 0%, #efe6d7 52%, #f5efe4 100%);
    }

    a {
      color: inherit;
    }

    .shell {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      min-height: 100vh;
      transition: grid-template-columns 180ms ease;
    }

    body.sidebar-collapsed .shell {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    .app-overlay {
      position: fixed;
      inset: 0;
      background: rgba(24, 16, 12, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 24;
    }

    body.sidebar-open .app-overlay {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 0;
      border-right: 1px solid var(--line);
      background: rgba(249, 242, 231, 0.92);
      backdrop-filter: blur(18px);
      overflow: hidden;
      transition: transform 180ms ease, opacity 180ms ease;
      z-index: 25;
    }

    .sidebar-inner {
      height: 100%;
      overflow-y: auto;
      padding: 28px 22px;
    }

    body.sidebar-collapsed .sidebar {
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
      border-right-color: transparent;
    }

    .brand {
      margin-bottom: 22px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .brand p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    .search {
      margin-bottom: 16px;
    }

    .search input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 14px 18px;
      background: var(--surface-strong);
      color: var(--ink);
      font-size: 15px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .current-panel,
    .favorites-shell,
    .quick-jumps-shell {
      margin-bottom: 14px;
    }

    .current-card,
    .favorites-card,
    .quick-jumps-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.48);
    }

    .panel-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .current-card strong {
      display: block;
      font-size: 15px;
      line-height: 1.4;
    }

    .current-card p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .panel-actions,
    .favorites-list,
    .quick-jumps {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .mini-action,
    .jump-chip,
    .favorite-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 12px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .jump-chip {
      background: rgba(255, 255, 255, 0.72);
    }

    .mode-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .filter-row,
    .toggle-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .toc-shell {
      margin-top: 6px;
    }

    .toc-shell summary {
      display: none;
      list-style: none;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.52);
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .toc-shell summary::-webkit-details-marker {
      display: none;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.56);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: 160ms ease;
    }

    .pill.active,
    .pill:hover {
      border-color: rgba(181, 68, 43, 0.34);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0 24px;
    }

    .stat {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.48);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      letter-spacing: -0.04em;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .toc {
      display: grid;
      gap: 8px;
      padding-bottom: 36px;
    }

    .toc a,
    .toc button {
      display: block;
      width: 100%;
      border: 0;
      padding: 10px 12px;
      border-radius: 14px;
      color: var(--muted);
      background: transparent;
      text-align: left;
      text-decoration: none;
      transition: 140ms ease;
      overflow-wrap: anywhere;
      cursor: pointer;
    }

    .toc a:hover,
    .toc a.active,
    .toc button:hover,
    .toc button.active {
      background: rgba(38, 27, 23, 0.05);
      color: var(--ink);
    }

    .toc .lv-h1 {
      font-weight: 800;
      color: var(--ink);
    }

    .toc .lv-h2 {
      padding-left: 18px;
      font-size: 14px;
    }

    .toc .lv-h3 {
      padding-left: 32px;
      font-size: 13px;
    }

    .main {
      min-width: 0;
      padding: 20px 22px 28px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 248, 240, 0.88);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 40px rgba(58, 32, 18, 0.08);
    }

    .topbar-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .icon-action {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .topbar-copy {
      min-width: 0;
    }

    .topbar-copy strong {
      display: block;
      font-size: 17px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .topbar-copy span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .section-sticky {
      position: sticky;
      top: 82px;
      z-index: 9;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 250, 244, 0.92);
      backdrop-filter: blur(16px);
      box-shadow: 0 14px 30px rgba(58, 32, 18, 0.08);
    }

    .section-sticky-copy {
      min-width: 0;
    }

    .section-sticky-copy strong {
      display: block;
      font-size: 14px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .section-sticky-copy span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .section-sticky-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .fab-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .fab {
      border: 1px solid rgba(38, 27, 23, 0.12);
      border-radius: 999px;
      padding: 12px 14px;
      background: rgba(255, 249, 242, 0.95);
      color: var(--ink);
      box-shadow: 0 16px 30px rgba(58, 32, 18, 0.12);
      backdrop-filter: blur(14px);
      font-size: 13px;
      cursor: pointer;
    }

    .hero {
      display: none;
    }

    .poster,
    .guide-note {
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 4px);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .poster {
      position: relative;
      min-height: 280px;
      padding: 28px;
      background:
        linear-gradient(120deg, rgba(27, 20, 16, 0.08), rgba(27, 20, 16, 0)),
        linear-gradient(160deg, rgba(181, 68, 43, 0.18), rgba(53, 87, 74, 0.2)),
        var(--surface);
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: auto -14% -28% auto;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.36), transparent 68%);
      pointer-events: none;
    }

    .poster h2 {
      max-width: 12ch;
      margin: 0;
      font-size: clamp(38px, 5vw, 74px);
      line-height: 0.92;
      letter-spacing: -0.07em;
    }

    .poster p {
      max-width: 50ch;
      margin: 18px 0 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .hero-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .hero-tags span {
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.45);
      font-size: 13px;
    }

    .guide-note {
      padding: 22px;
    }

    .guide-note h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .guide-note ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.75;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .list {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 56px);
      overflow: auto;
      padding-right: 4px;
    }

    .browser-panel,
    .detail-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .browser-panel {
      padding: 16px;
    }

    .browser-head,
    .detail-head {
      padding: 0 0 14px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }

    .browser-head h3,
    .detail-head h3 {
      margin: 0;
      font-size: 20px;
    }

    .browser-head p,
    .detail-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .browser-item {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.72);
      text-align: left;
      cursor: pointer;
      transition: 160ms ease;
    }

    .browser-item.active,
    .browser-item:hover {
      border-color: rgba(181, 68, 43, 0.28);
      background: rgba(181, 68, 43, 0.08);
      transform: translateY(-1px);
    }

    .browser-item strong {
      display: block;
      font-size: 15px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .browser-item p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .browser-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .detail-panel {
      padding: 22px;
      min-height: calc(100vh - 120px);
    }

    .detail-list {
      display: grid;
      gap: 18px;
    }

    .entry {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.42);
      box-shadow: 0 18px 38px rgba(58, 32, 18, 0.08);
      scroll-margin-top: 96px;
    }

    .entry-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .entry-kicker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tag {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--muted);
      background: rgba(38, 27, 23, 0.05);
    }

    .tag.accent {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .entry h3 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.06;
      letter-spacing: -0.05em;
      overflow-wrap: anywhere;
    }

    .subline {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .entry-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      cursor: pointer;
    }

    .action.active {
      border-color: rgba(53, 87, 74, 0.36);
      background: rgba(53, 87, 74, 0.12);
      color: var(--forest);
    }

    .summary {
      margin: 16px 0 0;
      color: var(--muted);
      line-height: 1.8;
      overflow-wrap: anywhere;
    }

    .bullets {
      margin: 14px 0 0;
      padding-left: 18px;
      line-height: 1.75;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .thumb {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      aspect-ratio: 4 / 3;
      background: #ece3d4;
      cursor: pointer;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 220ms ease;
    }

    .thumb:hover img {
      transform: scale(1.05);
    }

    .links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 10px 13px;
      text-decoration: none;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .empty {
      padding: 28px;
      border: 1px dashed rgba(38, 27, 23, 0.22);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.4);
      text-align: center;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(18, 12, 10, 0.78);
      z-index: 30;
    }

    .lightbox.open {
      display: grid;
    }

    .lightbox img {
      max-width: min(1200px, 100%);
      max-height: 88vh;
      border-radius: 20px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
    }

    .lightbox button {
      position: absolute;
      top: 20px;
      right: 20px;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    @media (max-width: 1100px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        top: 12px;
        left: 12px;
        bottom: 12px;
        width: min(380px, calc(100vw - 24px));
        height: auto;
        border: 1px solid var(--line);
        border-radius: 22px;
        transform: translateX(-110%);
        opacity: 0;
        pointer-events: none;
        box-shadow: 0 26px 60px rgba(20, 12, 10, 0.25);
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .browser-panel {
        position: static;
      }
    }

    @media (max-width: 720px) {
      body {
        background:
          radial-gradient(circle at top left, rgba(181, 68, 43, 0.12), transparent 14rem),
          linear-gradient(180deg, #f7f2e8 0%, #efe6d7 52%, #f5efe4 100%);
      }

      .main,
      .sidebar-inner {
        padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
      }

      .main {
        padding: 12px 14px 18px;
      }

      .brand {
        margin-bottom: 16px;
      }

      .brand h1 {
        font-size: 30px;
        line-height: 0.96;
      }

      .brand p {
        font-size: 13px;
        line-height: 1.55;
      }

      .search {
        margin-bottom: 12px;
      }

      .search input {
        padding: 12px 15px;
        font-size: 16px;
      }

      .filter-row,
      .mode-row,
      .toggle-row {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 4px;
        margin-right: -2px;
        scrollbar-width: none;
      }

      .filter-row::-webkit-scrollbar,
      .mode-row::-webkit-scrollbar,
      .toggle-row::-webkit-scrollbar {
        display: none;
      }

      .pill {
        flex: 0 0 auto;
        white-space: nowrap;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin: 12px 0 16px;
      }

      .stat {
        padding: 10px 12px;
      }

      .stat strong {
        font-size: 18px;
      }

      .toc-shell summary {
        display: block;
        margin-bottom: 10px;
      }

      .current-card,
      .favorites-card,
      .quick-jumps-card {
        padding: 12px;
        border-radius: 16px;
      }

      .panel-actions,
      .favorites-list,
      .quick-jumps {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .mini-action,
      .jump-chip,
      .favorite-chip {
        width: 100%;
        text-align: center;
      }

      .toc {
        gap: 4px;
        padding-bottom: 8px;
      }

      .toc a {
        padding: 9px 10px;
      }

      .toc .lv-h2 {
        padding-left: 14px;
      }

      .toc .lv-h3 {
        padding-left: 22px;
      }

      .hero {
        gap: 14px;
        margin-bottom: 16px;
      }

      .poster,
      .guide-note,
      .topbar,
      .entry,
      .empty {
        border-radius: 18px;
        box-shadow: 0 18px 38px rgba(58, 32, 18, 0.1);
      }

      .poster {
        min-height: 0;
        padding: 18px;
      }

      .poster::after {
        width: 180px;
        height: 180px;
        inset: auto -9% -14% auto;
      }

      .poster h2 {
        max-width: 100%;
        font-size: clamp(30px, 12vw, 46px);
        line-height: 0.94;
      }

      .poster p,
      .guide-note ul,
      .summary,
      .bullets {
        font-size: 14px;
        line-height: 1.65;
      }

      .hero-tags {
        gap: 8px;
        margin-top: 14px;
      }

      .hero-tags span {
        padding: 7px 10px;
        font-size: 12px;
      }

      .guide-note {
        padding: 18px;
      }

      .entry {
        padding: 18px;
        scroll-margin-top: 10px;
      }

      .browser-panel,
      .detail-panel {
        border-radius: 18px;
      }

      .browser-panel,
      .detail-panel {
        padding: 16px;
      }

      .topbar {
        padding: 12px;
        align-items: flex-start;
      }

      .section-sticky {
        top: 74px;
        flex-direction: column;
        align-items: stretch;
      }

      .section-sticky-actions {
        width: 100%;
      }

      .section-sticky-actions .icon-action {
        flex: 1 1 0;
      }

      .topbar-main {
        align-items: flex-start;
      }

      .topbar-actions {
        width: 100%;
        justify-content: stretch;
      }

      .topbar-actions .icon-action {
        flex: 1 1 calc(50% - 4px);
        text-align: center;
      }

      .entry-header {
        flex-direction: column;
        gap: 12px;
      }

      .entry-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: 100%;
        justify-content: stretch;
      }

      .action {
        width: 100%;
        text-align: center;
      }

      .entry h3 {
        font-size: clamp(20px, 7vw, 28px);
      }

      .subline {
        font-size: 12px;
      }

      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 14px;
      }

      .thumb {
        border-radius: 14px;
      }

      .links {
        display: grid;
        gap: 8px;
      }

      .links a {
        width: 100%;
        border-radius: 14px;
        justify-content: center;
        padding: 11px 12px;
        text-align: center;
      }

      .lightbox {
        padding: 12px;
      }

      .lightbox img {
        max-height: 82vh;
        border-radius: 14px;
      }

      .lightbox button {
        top: 12px;
        right: 12px;
      }

      .fab-stack {
        right: 12px;
        bottom: 12px;
      }
    }

    @media (max-width: 420px) {
      .main,
      .sidebar {
        padding-left: 12px;
        padding-right: 12px;
      }

      .stats,
      .panel-actions,
      .favorites-list,
      .quick-jumps,
      .entry-actions,
      .gallery {
        grid-template-columns: 1fr;
      }

      .brand h1 {
        font-size: 26px;
      }

      .poster h2 {
        font-size: 28px;
      }

      .topbar-actions .icon-action {
        flex-basis: 100%;
      }

      .section-sticky-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app-overlay" id="appOverlay"></div>
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
      <div class="brand">
        <p class="eyebrow">Private Guide App</p>
        <h1>Infinite Fusion<br>Guide JP</h1>
        <p>原文ウォークスルーを、探しやすい章構成と進行管理付きの個人用ガイドに再整理しています。</p>
      </div>

      <div class="search">
        <input id="searchInput" type="search" placeholder="章名・場所名・本文を検索">
      </div>

      <div class="current-panel" id="currentPanel"></div>

      <div class="quick-jumps-shell">
        <div class="quick-jumps-card">
          <p class="panel-label">Quick Jump</p>
          <div class="quick-jumps" id="quickJumps"></div>
        </div>
      </div>

      <div class="mode-row" id="modeFilters"></div>
      <div class="filter-row" id="regionFilters"></div>
      <div class="toggle-row" id="stateFilters"></div>

      <div class="stats">
        <div class="stat">
          <strong id="visibleCount">0</strong>
          <span>表示中の項目</span>
        </div>
        <div class="stat">
          <strong id="doneCount">0</strong>
          <span>完了チェック</span>
        </div>
      </div>

      <details class="toc-shell" open>
        <summary>目次を開く</summary>
        <nav class="toc" id="toc"></nav>
      </details>

      <details class="toc-shell" open>
        <summary>お気に入り</summary>
        <div class="favorites-card">
          <p class="panel-label">Favorites</p>
          <div class="favorites-list" id="favoritesList"></div>
        </div>
      </details>

      <details class="toc-shell" open>
        <summary>章ブラウザ</summary>
        <div class="browser-panel">
          <div class="browser-head">
            <h3>章ブラウザ</h3>
            <p>検索・絞り込み後の章をここから開きます。</p>
          </div>
          <section class="list" id="list"></section>
        </div>
      </details>
      </div>
    </aside>

    <main class="main">
      <section class="topbar">
        <div class="topbar-main">
          <button type="button" class="icon-action" id="menuToggle">メニュー</button>
          <div class="topbar-copy">
            <strong id="activeTitle">章を選択してください</strong>
            <span id="activeMeta">左メニューから章ジャンプ、検索、フィルタにアクセスできます。</span>
          </div>
        </div>
        <div class="topbar-actions">
          <button type="button" class="icon-action" data-resume="true">続きから</button>
          <button type="button" class="icon-action" data-show-saved="true">お気に入り</button>
          <button type="button" class="icon-action" data-open-browser="true">章ブラウザ</button>
        </div>
      </section>

      <section class="section-sticky">
        <div class="section-sticky-copy">
          <strong id="stickySectionTitle">現在の章</strong>
          <span id="stickySectionMeta">スクロールに合わせて更新されます。</span>
        </div>
        <div class="section-sticky-actions">
          <button type="button" class="icon-action" data-open-browser="true">章一覧</button>
          <button type="button" class="icon-action" data-resume="true">続きから</button>
        </div>
      </section>

      <section class="detail-panel" id="detail"></section>
    </main>
  </div>

  <div class="fab-stack">
    <button type="button" class="fab" data-open-browser="true">目次</button>
    <button type="button" class="fab" data-show-saved="true">保存</button>
    <button type="button" class="fab" id="scrollTopFab">上へ</button>
  </div>

  <div class="lightbox" id="lightbox">
    <button type="button" id="lightboxClose">閉じる</button>
    <img id="lightboxImage" alt="拡大画像">
  </div>

  <script>
    const data = window.__GUIDE_DATA_JA__ || window.__GUIDE_DATA__;

    if (!data) {
      document.getElementById("list").innerHTML = '<div class="empty">`guide-data.js` が見つかりません。`build_guide_data.py` を実行してデータを生成してください。</div>';
      throw new Error("guide-data.js is missing");
    }

    const titleMap = {
      "Kanto’s Story": "カントー編",
      "Johto and Sevii Islands": "ジョウト・セヴィ諸島編",
      "End Game Content": "クリア後コンテンツ",
      "Useful Links and Lists": "便利リンク集",
      "Author’s note": "作者メモ",
      "Thanks": "謝辞",
      "Game Startup and Setup": "起動と初期設定",
      "Trainer Application Form": "トレーナー申請フォーム",
      "Journey’s Beginning": "旅のはじまり",
      "Boulder Badge": "グレーバッジ",
      "Cascade Badge": "ブルーバッジ",
      "Thunder Badge": "オレンジバッジ",
      "Rainbow Badge": "レインボーバッジ",
      "Soul Badge": "ピンクバッジ",
      "Marsh Badge": "ゴールドバッジ",
      "Volcano Badge": "クリムゾンバッジ",
      "Earth Badge": "グリーンバッジ",
      "Elite Four": "四天王",
      "Plain Badge": "レギュラーバッジ",
      "Hive Badge": "インセクトバッジ",
      "Zephyr Badge": "ウイングバッジ",
      "Professor Elm": "ウツギ博士イベント",
      "Rising Badge": "ライジングバッジ",
      "Glacier Badge": "アイスバッジ",
      "Fog Badge": "ファントムバッジ",
      "Storm Badge": "ストームバッジ",
      "Mineral Badge": "スチールバッジ",
      "Mt. Silver": "シロガネやま",
      "The Creation Trio": "創造神トリオ",
      "Rayquaza": "レックウザ",
      "Alien Spaceship": "宇宙船イベント",
      "Optional Items - Corsolas": "任意アイテム - サニーゴ",
      "Regigigas": "レジギガス",
      "Genesect": "ゲノセクト",
      "Triple Fusion": "トリプルフュージョン",
      "Pokemon League Rematch": "ポケモンリーグ再戦",
      "Vermillion’s Fighting Arena": "クチバ格闘アリーナ",
      "Cinnabar Island": "グレンタウン追加要素",
      "Pokedex Completion": "図鑑コンプリート",
      "Optional Objectives - Diglett’s Cave and Cut": "寄り道 - ディグダの穴といあいぎり",
      "Optional Objectives - Strength": "寄り道 - かいりき",
      "Optional Objectives - Surf": "寄り道 - なみのり",
      "Optional Objectives - Legendary Birds and more": "寄り道 - 三鳥ほか",
      "Optional Objectives - Waterfall and Mewtwo": "寄り道 - たきのぼりとミュウツー",
      "Optional Objectives - Karma and the Tao trio": "寄り道 - カルマとタオトリオ",
      "Optional Objectives - Tower Duo, Ruby and Sapphire": "寄り道 - 塔デュオとルビー/サファイア"
    };

    const state = JSON.parse(localStorage.getItem("if-guide-state") || "{}");
    state._app = state._app || {};
    const appState = state._app;
    const regionLabels = ["すべて", "カントー編", "ジョウト・セヴィ諸島編", "クリア後コンテンツ", "便利リンク集"];
    const modeLabels = ["通常進行", "寄り道込み", "伝説回収重視"];
    const quickJumpItems = [
      { label: "なみのり", query: "なみのり" },
      { label: "シルフ", query: "Silph" },
      { label: "グレン", query: "Cinnabar" },
      { label: "ミュウツー", query: "Mewtwo" },
      { label: "レックウザ", query: "Rayquaza" },
      { label: "図鑑", query: "Pokedex" }
    ];
    let currentRegion = "すべて";
    let showSavedOnly = false;
    let showUndoneOnly = false;
    let query = "";
    let currentMode = appState.mode || "寄り道込み";
    let activeSectionId = appState.currentSection || null;
    let visibleSectionIds = [];
    if (typeof appState.sidebarCollapsed !== "boolean") appState.sidebarCollapsed = false;

    const sectionList = data.sections.map((section, index) => {
      const id = `section-${index}`;
      let region = section.title;
      if (section.level !== "h1") {
        for (let i = index; i >= 0; i -= 1) {
          if (data.sections[i].level === "h1") {
            region = data.sections[i].title;
            break;
          }
        }
      }
      let chapter = null;
      let chapterJa = null;
      if (section.level === "h3") {
        for (let i = index; i >= 0; i -= 1) {
          if (data.sections[i].level === "h2") {
            chapter = data.sections[i].title;
            chapterJa = data.sections[i].title_ja || "";
            break;
          }
        }
      }
      return { ...section, id, region, chapter, chapter_ja: chapterJa };
    });

    function saveState() {
      localStorage.setItem("if-guide-state", JSON.stringify(state));
    }

    function isMobileLayout() {
      return window.matchMedia("(max-width: 1100px)").matches;
    }

    function applySidebarState() {
      const body = document.body;
      if (isMobileLayout()) {
        body.classList.remove("sidebar-collapsed");
        body.classList.toggle("sidebar-open", Boolean(appState.sidebarOpen));
      } else {
        body.classList.remove("sidebar-open");
        body.classList.toggle("sidebar-collapsed", Boolean(appState.sidebarCollapsed));
      }
    }

    function openSidebar() {
      if (isMobileLayout()) {
        appState.sidebarOpen = true;
      } else {
        appState.sidebarCollapsed = false;
      }
      saveState();
      applySidebarState();
    }

    function closeSidebar() {
      if (isMobileLayout()) {
        appState.sidebarOpen = false;
      } else {
        appState.sidebarCollapsed = true;
      }
      saveState();
      applySidebarState();
    }

    function toggleSidebar() {
      if (isMobileLayout()) {
        appState.sidebarOpen = !appState.sidebarOpen;
      } else {
        appState.sidebarCollapsed = !appState.sidebarCollapsed;
      }
      saveState();
      applySidebarState();
    }

    function getSectionById(id) {
      return sectionList.find((section) => section.id === id) || null;
    }

    function getSelectedSection(filteredSections) {
      const current = filteredSections.find((section) => section.id === activeSectionId);
      if (current) return current;
      const resumed = filteredSections.find((section) => section.id === appState.currentSection);
      if (resumed) return resumed;
      return filteredSections[0] || null;
    }

    function setCurrentSection(id) {
      if (!id || appState.currentSection === id) return;
      appState.currentSection = id;
      activeSectionId = id;
      saveState();
      renderCurrentPanel();
    }

    function translateTitle(title, translatedTitle = "") {
      if (titleMap[title]) return titleMap[title];
      if (translatedTitle) return translatedTitle;

      let result = title;
      result = result.replace(/^Route (\d+)$/, "$1番道路");
      result = result.replace(/^Route (\d+) and Route (\d+)$/, "$1番道路と$2番道路");
      result = result.replace(/^Route (\d+) \((.+)\)$/, (_, route, note) => `${route}番道路 (${note})`);
      result = result.replace(/ Gym$/, " ジム");
      result = result.replace(/ City$/, " City");
      result = result.replace(/ Town$/, " Town");
      result = result.replace(/ Island$/, " Island");
      result = result.replace(/ Cave$/, " Cave");
      result = result.replace(/ Forest$/, " Forest");
      result = result.replace(/ Road$/, " Road");
      return result;
    }

    function isLocationTitle(title = "", level = "") {
      if (level === "h3") return true;
      return /^(Route \d+|Mt\. |S\.S\. Anne|Pallet Town|Viridian City|Pewter City|Cerulean City|Vermillion City|Lavender Town|Celadon City|Fuchsia City|Saffron City|Goldenrod City|Azalea Town|Violet City|Cherrygrove City|New Bark Town|Blackthorn City|Mahogany Town|Ecruteak City|Cinnabar Island|Safari Zone|Pokemon Tower|Viridian Forest|Ilex Forest|Rock Tunnel|Mt\. Moon|Union Cave|Ruins of Alph|National Park|Seafoam Islands|Victory Road|Indigo Plateau|Ice Mountains|Mt\. Mortar|Lake of Rage|Navel Rock|Bond Bridge|Berry Forest|Mt\. Silver|Sky Pillar|Birth Island|Water Labyrinth|Resort Gorgeous|Sealed Chamber|Chrono Island|Dragon’s Den|Dragon's Den|Burned Tower|Bell Tower|Cerulean Cape|Secret Garden|Secret Forest|Power Plant|Diglett’s Cave|Diglett's Cave|Underground Path|Pokemon Mansion|Silph Co\. Head Office|Fighting Dojo|Creepy House|Viridian River|Crimson City|Offshore Road|Kindle Road|Brine Road|Boon Island|Kin Island|Knot Island|Treasure Beach|Togepi Island|Deep Sea|Ruby Chamber|Sapphire Cave|Dark Cave|Tohjo Falls|Cerulean Cave|P2 Laboratory|Team Rocket Warehouse|Pokemon League Gate)$/i.test(title);
    }

    function displayTitle(title, translatedTitle = "", level = "") {
      if (isLocationTitle(title, level)) return title;
      return translateTitle(title, translatedTitle);
    }

    function regionLabel(raw) {
      return titleMap[raw] || raw;
    }

    function levelLabel(level) {
      return level === "h1" ? "大章" : level === "h2" ? "章" : "場所";
    }

    function searchableText(section) {
      return [
        section.title,
        displayTitle(section.title, section.title_ja, section.level),
        section.title_ja || "",
        section.region,
        section.chapter || "",
        section.chapter_ja || "",
        ...(section.paragraphs || []),
        ...(section.paragraphs_ja || []),
        ...(section.bullets || []),
        ...(section.bullets_ja || [])
      ].join(" ").toLowerCase();
    }

    function classifySection(section) {
      const own = section.title || "";
      const chapter = section.chapter || "";
      const region = section.region || "";
      const combined = `${own} ${chapter} ${region}`;

      if (region === "Useful Links and Lists" || own === "Useful Links and Lists") return "reference";
      if (["Overview", "Author’s note", "Thanks", "Game Startup and Setup", "Trainer Application Form"].includes(own)) return "setup";
      if (/Legendary|Mewtwo|Creation Trio|Rayquaza|Regigigas|Genesect|Triple Fusion|Pokedex Completion|Tower Duo|Ruby and Sapphire|Tao trio|Legendary Birds|Corsolas/i.test(combined)) return "collection";
      if (/Optional Objectives|Optional Items/i.test(combined)) return "optional";
      return "main";
    }

    sectionList.forEach((section) => {
      section.modeGroup = classifySection(section);
    });

    function isSaved(id) {
      return Boolean(state[id]?.saved);
    }

    function isDone(id) {
      return Boolean(state[id]?.done);
    }

    function matchesMode(section) {
      if (currentMode === "寄り道込み") return true;
      if (currentMode === "通常進行") return ["main", "setup"].includes(section.modeGroup);
      if (currentMode === "伝説回収重視") return ["collection", "reference"].includes(section.modeGroup);
      return true;
    }

    function getFilteredSections() {
      return sectionList.filter((section) => {
        const regionMatch = currentRegion === "すべて" || regionLabel(section.region) === currentRegion;
        const savedMatch = !showSavedOnly || isSaved(section.id);
        const undoneMatch = !showUndoneOnly || !isDone(section.id);
        const queryMatch = !query || searchableText(section).includes(query);
        const modeMatch = matchesMode(section);
        return regionMatch && savedMatch && undoneMatch && queryMatch && modeMatch;
      });
    }

    function renderModes() {
      const root = document.getElementById("modeFilters");
      root.innerHTML = modeLabels.map((label) => {
        const active = label === currentMode ? "active" : "";
        return `<button class="pill ${active}" data-mode="${label}">${label}</button>`;
      }).join("");
    }

    function renderFilters() {
      const regionRoot = document.getElementById("regionFilters");
      regionRoot.innerHTML = regionLabels.map((label) => {
        const active = label === currentRegion ? "active" : "";
        return `<button class="pill ${active}" data-region="${label}">${label}</button>`;
      }).join("");

      const stateRoot = document.getElementById("stateFilters");
      stateRoot.innerHTML = `
        <button class="pill ${showSavedOnly ? "active" : ""}" data-toggle="saved">保存のみ</button>
        <button class="pill ${showUndoneOnly ? "active" : ""}" data-toggle="undone">未完了のみ</button>
      `;
    }

    function renderQuickJumps() {
      const root = document.getElementById("quickJumps");
      root.innerHTML = quickJumpItems.map((item) => {
        return `<button class="jump-chip" data-quick-jump="${item.query}">${item.label}</button>`;
      }).join("");
    }

    function renderFavorites() {
      const root = document.getElementById("favoritesList");
      const favorites = sectionList.filter((section) => isSaved(section.id)).slice(0, 10);
      if (!favorites.length) {
        root.innerHTML = '<div class="subline">保存した章がここに並びます。</div>';
        return;
      }
      root.innerHTML = favorites.map((section) => {
        const label = translateTitle(section.title, section.title_ja);
        return `<button class="favorite-chip" data-jump-section="${section.id}">${label}</button>`;
      }).join("");
    }

    function renderCurrentPanel() {
      const root = document.getElementById("currentPanel");
      const section = getSectionById(activeSectionId || appState.currentSection);
      if (!section) {
        root.innerHTML = `
          <div class="current-card">
            <p class="panel-label">Continue</p>
            <strong>現在地はまだ保存されていません。</strong>
            <p>スクロールすると今見ている章を自動記録します。</p>
          </div>
        `;
        return;
      }
      const label = translateTitle(section.title, section.title_ja);
      const chapterLabel = section.chapter ? translateTitle(section.chapter, section.chapter_ja) : regionLabel(section.region);
      root.innerHTML = `
        <div class="current-card">
          <p class="panel-label">Continue</p>
          <strong>${label}</strong>
          <p>${chapterLabel}</p>
          <div class="panel-actions">
            <button class="mini-action" data-resume="true">続きから開く</button>
            <button class="mini-action" data-clear-progress="true">現在地を消す</button>
          </div>
        </div>
      `;
    }

    function renderTopbar(section) {
      const title = document.getElementById("activeTitle");
      const meta = document.getElementById("activeMeta");
      const stickyTitle = document.getElementById("stickySectionTitle");
      const stickyMeta = document.getElementById("stickySectionMeta");
      if (!section) {
        title.textContent = "章を選択してください";
        meta.textContent = "左メニューから章ジャンプ、検索、フィルタにアクセスできます。";
        stickyTitle.textContent = "現在の章";
        stickyMeta.textContent = "スクロールに合わせて更新されます。";
        return;
      }
      const translated = displayTitle(section.title, section.title_ja, section.level);
      const detail = section.chapter
        ? `${displayTitle(section.chapter, section.chapter_ja, "h2")} / ${regionLabel(section.region)}`
        : regionLabel(section.region);
      title.textContent = translated;
      meta.textContent = detail;
      stickyTitle.textContent = translated;
      stickyMeta.textContent = detail;
    }

    function renderToc() {
      const toc = document.getElementById("toc");
      toc.innerHTML = getFilteredSections().map((section) => {
        const label = displayTitle(section.title, section.title_ja, section.level);
        const active = section.id === activeSectionId ? "active" : "";
        return `<button type="button" class="lv-${section.level} ${active}" data-select-section="${section.id}">${label}</button>`;
      }).join("");
    }

    function renderList() {
      const list = document.getElementById("list");
      const detail = document.getElementById("detail");
      const filtered = getFilteredSections();
      visibleSectionIds = filtered.map((section) => section.id);

      document.getElementById("visibleCount").textContent = String(filtered.length);
      document.getElementById("doneCount").textContent = String(sectionList.filter((section) => isDone(section.id)).length);

      if (!filtered.length) {
        list.innerHTML = '<div class="empty">一致する項目がありません。検索語や絞り込みを調整してください。</div>';
        detail.innerHTML = '<div class="empty">表示できる章がありません。</div>';
        activeSectionId = null;
        renderTopbar(null);
        renderToc();
        return;
      }

      const selectedSection = getSelectedSection(filtered);
      activeSectionId = selectedSection.id;
      setCurrentSection(selectedSection.id);
      renderTopbar(selectedSection);
      renderToc();

      list.innerHTML = filtered.map((section) => {
        const translated = displayTitle(section.title, section.title_ja, section.level);
        const summary = section.paragraphs_ja?.[0] || section.paragraphs?.[0] || "";
        const chapterLabel = section.chapter ? displayTitle(section.chapter, section.chapter_ja, "h2") : null;
        const active = section.id === selectedSection.id ? "active" : "";
        const saved = isSaved(section.id) ? "保存済み" : "";
        const done = isDone(section.id) ? "完了済み" : "";

        return `
          <button type="button" class="browser-item ${active}" data-select-section="${section.id}">
            <div class="browser-meta">
              <span class="tag accent">${levelLabel(section.level)}</span>
              <span class="tag">${regionLabel(section.region)}</span>
              ${chapterLabel ? `<span class="tag">${chapterLabel}</span>` : ""}
              ${saved ? `<span class="tag">${saved}</span>` : ""}
              ${done ? `<span class="tag">${done}</span>` : ""}
            </div>
            <strong>${translated}</strong>
            ${summary ? `<p>${summary}</p>` : `<p>この章を開いて詳細を確認します。</p>`}
          </button>
        `;
      }).join("");
      detail.innerHTML = `
        <div class="detail-head">
          <h3>ガイド本文</h3>
          <p>フィルタ結果をそのまま連続表示しています。章ブラウザや目次から必要な場所へジャンプできます。</p>
        </div>
        <div class="detail-list">
          ${filtered.map((section) => {
            const translated = displayTitle(section.title, section.title_ja, section.level);
            const summary = section.paragraphs_ja?.[0] || section.paragraphs?.[0] || "";
            const bullets = section.bullets_ja?.length ? section.bullets_ja : section.bullets || [];
            const images = section.images || [];
            const links = section.links || [];
            const chapterLabel = section.chapter ? displayTitle(section.chapter, section.chapter_ja, "h2") : null;

            return `
              <article class="entry" id="${section.id}">
                <div class="entry-header">
                  <div>
                    <div class="entry-kicker">
                      <span class="tag accent">${levelLabel(section.level)}</span>
                      <span class="tag">${regionLabel(section.region)}</span>
                      ${chapterLabel ? `<span class="tag">${chapterLabel}</span>` : ""}
                    </div>
                    <h3>${translated}</h3>
                    <div class="subline">原題: ${section.title}</div>
                  </div>
                  <div class="entry-actions">
                    <button class="action ${isSaved(section.id) ? "active" : ""}" data-action="save" data-id="${section.id}">${isSaved(section.id) ? "保存済み" : "保存"}</button>
                    <button class="action ${isDone(section.id) ? "active" : ""}" data-action="done" data-id="${section.id}">${isDone(section.id) ? "完了済み" : "完了"}</button>
                  </div>
                </div>

                ${summary ? `<p class="summary">${summary}</p>` : ""}
                ${section.paragraphs_ja?.slice(1).length ? section.paragraphs_ja.slice(1).map((text) => `<p class="summary">${text}</p>`).join("") : ""}

                ${bullets.length ? `
                  <ul class="bullets">
                    ${bullets.map((item) => `<li>${item}</li>`).join("")}
                  </ul>
                ` : ""}

                ${images.length ? `
                  <div class="gallery">
                    ${images.map((src) => `<button class="thumb" data-image="${src}" title="画像を拡大"><img src="${src}" alt="${translated}"></button>`).join("")}
                  </div>
                ` : ""}

                ${links.length ? `
                  <div class="links">
                    ${links.map((link) => `<a href="${link.url}" target="_blank" rel="noreferrer">${link.label_ja || link.label}</a>`).join("")}
                  </div>
                ` : ""}
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function jumpToSection(id, behavior = "smooth") {
      activeSectionId = id;
      setCurrentSection(id);
      renderList();
      if (isMobileLayout()) closeSidebar();
      document.getElementById("detail")?.scrollIntoView({ behavior, block: "start" });
      setTimeout(() => {
        document.getElementById(id)?.scrollIntoView({ behavior, block: "start" });
      }, 20);
    }

    function updateActiveFromViewport() {
      const entries = visibleSectionIds
        .map((id) => document.getElementById(id))
        .filter(Boolean);
      const current = entries.find((entry) => {
        const rect = entry.getBoundingClientRect();
        return rect.top <= 170 && rect.bottom >= 170;
      });
      if (!current || current.id === activeSectionId) return;
      activeSectionId = current.id;
      setCurrentSection(current.id);
      renderTopbar(getSectionById(current.id));
      renderToc();
      const browserButtons = document.querySelectorAll(".browser-item");
      browserButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.selectSection === current.id);
      });
    }

    function resetTransientFilters() {
      currentRegion = "すべて";
      showSavedOnly = false;
      showUndoneOnly = false;
    }

    function applyQuickJump(rawQuery) {
      resetTransientFilters();
      query = rawQuery.toLowerCase();
      document.getElementById("searchInput").value = rawQuery;
      renderFilters();
      renderModes();
      renderList();
      const first = getFilteredSections()[0];
      if (first) {
        setTimeout(() => jumpToSection(first.id), 40);
      }
    }

    document.getElementById("searchInput").addEventListener("input", (event) => {
      query = event.target.value.trim().toLowerCase();
      renderList();
    });

    document.getElementById("menuToggle").addEventListener("click", () => {
      toggleSidebar();
    });

    document.getElementById("scrollTopFab").addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.getElementById("appOverlay").addEventListener("click", () => {
      if (isMobileLayout()) closeSidebar();
    });

    document.addEventListener("click", (event) => {
      const regionButton = event.target.closest("[data-region]");
      if (regionButton) {
        currentRegion = regionButton.dataset.region;
        renderFilters();
        renderList();
        return;
      }

      const sectionButton = event.target.closest("[data-select-section]");
      if (sectionButton) {
        jumpToSection(sectionButton.dataset.selectSection);
        return;
      }

      if (event.target.closest("[data-show-saved]")) {
        showSavedOnly = true;
        renderFilters();
        renderList();
        openSidebar();
        return;
      }

      if (event.target.closest("[data-open-browser]")) {
        openSidebar();
        const browser = document.getElementById("list");
        browser?.scrollIntoView({ behavior: "smooth", block: "start" });
        return;
      }

      const modeButton = event.target.closest("[data-mode]");
      if (modeButton) {
        currentMode = modeButton.dataset.mode;
        appState.mode = currentMode;
        saveState();
        renderModes();
        renderList();
        return;
      }

      const toggleButton = event.target.closest("[data-toggle]");
      if (toggleButton) {
        if (toggleButton.dataset.toggle === "saved") showSavedOnly = !showSavedOnly;
        if (toggleButton.dataset.toggle === "undone") showUndoneOnly = !showUndoneOnly;
        renderFilters();
        renderList();
        return;
      }

      const action = event.target.closest("[data-action]");
      if (action) {
        const id = action.dataset.id;
        state[id] = state[id] || {};
        if (action.dataset.action === "save") state[id].saved = !state[id].saved;
        if (action.dataset.action === "done") state[id].done = !state[id].done;
        saveState();
        renderFavorites();
        renderCurrentPanel();
        renderList();
        return;
      }

      const quickJump = event.target.closest("[data-quick-jump]");
      if (quickJump) {
        applyQuickJump(quickJump.dataset.quickJump);
        return;
      }

      const favoriteJump = event.target.closest("[data-jump-section]");
      if (favoriteJump) {
        resetTransientFilters();
        query = "";
        document.getElementById("searchInput").value = "";
        renderFilters();
        renderModes();
        renderList();
        setTimeout(() => jumpToSection(favoriteJump.dataset.jumpSection), 40);
        return;
      }

      if (event.target.closest("[data-resume]")) {
        const targetId = appState.currentSection;
        if (targetId) {
          resetTransientFilters();
          query = "";
          document.getElementById("searchInput").value = "";
          renderFilters();
          renderModes();
          renderList();
          setTimeout(() => jumpToSection(targetId), 40);
        }
        return;
      }

      if (event.target.closest("[data-clear-progress]")) {
        delete appState.currentSection;
        activeSectionId = null;
        saveState();
        renderCurrentPanel();
        return;
      }

      const imageButton = event.target.closest("[data-image]");
      if (imageButton) {
        document.getElementById("lightboxImage").src = imageButton.dataset.image;
        document.getElementById("lightbox").classList.add("open");
      }
    });

    const lightbox = document.getElementById("lightbox");
    document.getElementById("lightboxClose").addEventListener("click", () => {
      lightbox.classList.remove("open");
    });
    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) lightbox.classList.remove("open");
    });

    renderCurrentPanel();
    renderQuickJumps();
    renderModes();
    applySidebarState();
    renderFilters();
    renderFavorites();
    renderToc();
    renderList();

    if (!window.location.hash && appState.currentSection) {
      setTimeout(() => jumpToSection(appState.currentSection, "auto"), 120);
    }

    window.addEventListener("resize", () => {
      applySidebarState();
    });
    document.addEventListener("scroll", updateActiveFromViewport, { passive: true });
  </script>
</body>
</html>
